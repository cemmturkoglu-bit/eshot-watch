name: ESHOT 684 Veri Toplayici

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests --quiet
      - name: Veri Topla
        run: python collector/collect.py
      - name: Ihlal Analizi
        run: python collector/analyze.py
      - name: Push
        run: |
          git config user.name "ESHOT-Watch Bot"
          git config user.email "bot@eshot-watch.github.io"
          git add data/
          git diff --staged --quiet && echo "Degisiklik yok." || git commit -m "veri $(date '+%Y-%m-%d %H:%M')" && git push
